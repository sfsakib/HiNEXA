<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="mobile-app">
    <div class="top-header">
      <div class="logo">HiGNICE</div>
      <div class="page-title">Log in</div>
      <div class="sub-text">
        Please log in with your phone number and password
      </div>
    </div>

    <div class="form-area">
      <div class="input-group">
        <label class="input-label">Phone number</label>
        <input class="input-box" id="phone" placeholder="Enter phone number" />
      </div>

      <div class="input-group">
        <label class="input-label">Password</label>
        <input class="input-box" id="password" type="password" placeholder="Enter password" />
      </div>

      <div class="btn-wrap">
        <button class="btn btn-primary" onclick="loginUser()">Log in</button>
      </div>

      <div class="btn-wrap">
        <a href="register.html">
          <button class="btn btn-outline">Register</button>
        </a>
      </div>

      <div class="link-row">
        Admin login: <b>01900000000 / 123456</b>
      </div>
    </div>
  </div>

  <script>
async function loginUser() {
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!phone || !password) {
    alert("Phone and password required");
    return;
  }

  const res = await fetch("/api/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ phone, password })
  });

  const data = await res.json();

  if (!res.ok) {
    alert(data.message || "Login failed");
    return;
  }

  // save user
  localStorage.setItem("token", data.token);
  localStorage.setItem("user", JSON.stringify(data.user));
  localStorage.setItem("userId", data.user._id);

  // 🔥 clean redirect
  if (data.user.role === "admin") {
    window.location.href = "admin.html";
  } else {
    window.location.href = "home.html";
  }
}
</script>

</body>
</html>
