<!DOCTYPE html>
<html>
<head>
  <title>Rejected Deposits</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f5f7fb;
    }

    .container{
      padding:20px;
    }

    h2{
      margin-bottom:15px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
      border-radius:10px;
      overflow:hidden;
    }

    thead{
      background:linear-gradient(45deg,#ef4444,#dc2626);
      color:#fff;
    }

    th, td{
      padding:12px;
      border-bottom:1px solid #eee;
      font-size:14px;
    }

    tbody tr:hover{
      background:#fff1f2;
    }

    .amount{
      font-weight:bold;
      color:#ef4444;
    }

    .status{
      color:#ef4444;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Rejected Deposits</h2>

  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Phone</th>
        <th>Amount</th>
        <th>Method</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="data"></tbody>
  </table>

</div>

<script>
async function loadData(){
  const res = await fetch("/api/admin/rejected-deposits");
  const data = await res.json();

  let html = "";

  if(data.length === 0){
    html = "<tr><td colspan='5'>No Rejected Deposits</td></tr>";
  } else {
    data.forEach(d => {
      html += `
        <tr>
          <td>${d.userId?.name || "No Name"}</td>
          <td>${d.userId?.phone || "-"}</td>
          <td class="amount">৳${d.amount}</td>
          <td>${d.method || "-"}</td>
          <td class="status">Rejected</td>
        </tr>
      `;
    });
  }

  document.getElementById("data").innerHTML = html;
}

loadData();
</script>

</body>
</html>
