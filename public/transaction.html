<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Transactions</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#dfe1ea; /* outer gray */
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:415px;
  min-height:100vh;
  background:#f5f7fb;
}

/* HEADER */
.header{
  background:linear-gradient(180deg,#ff6a6a,#ff8a8a);
  padding:15px;
  text-align:center;
  font-weight:bold;
  position:sticky;
  top:0;
  color:#fff;
}

.back{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:18px;
  color:#fff;
}

/* FILTER */
.filter{
  display:flex;
  gap:8px;
  padding:10px;
  overflow-x:auto;
}

.filter button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#eee;
  white-space:nowrap;
}

.filter .active{
  background:#ff5b5b;
  color:#fff;
}

/* CARD */
.card{
  background:#fff;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.top{
  display:flex;
  justify-content:space-between;
}

.tag{
  color:#fff;
  padding:5px 10px;
  border-radius:6px;
  font-size:13px;
}

.deposit{background:#22c55e;}
.withdraw{background:#3b82f6;}
.referral{background:#a855f7;}
.game{background:#f59e0b;}
.gift{background:#ec4899;}

.status{
  font-weight:bold;
}

.status.pending{color:orange;}
.status.approved{color:green;}
.status.rejected{color:red;}

.info{
  margin-top:10px;
}

.info p{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.amount{
  color:#ff7a00;
}

.btn{
  margin-top:10px;
  background:#ff5b5b;
  color:#fff;
  text-align:center;
  padding:10px;
  border-radius:20px;
}
</style>
</head>

<body>

  <div class="app">

<div class="header">
    <i class="fas fa-arrow-left back" onclick="history.back()"></i>
    Transaction History
  </div>

<div class="filter">
  <button class="active" onclick="setFilter('all', this)">All</button>
  <button onclick="setFilter('deposit', this)">Deposit</button>
  <button onclick="setFilter('withdraw', this)">Withdraw</button>
  <button onclick="setFilter('referral', this)">Commission</button>
  <button onclick="setFilter('game', this)">Game</button>
  <button onclick="setFilter('gift', this)">Gift</button>
</div>

<div id="history"></div>

</div>

<script>

let allData = [];
let currentFilter = "all";

async function loadHistory(){

  const user = JSON.parse(localStorage.getItem("user"));

  if(!user){
    alert("Login first");
    location.href="login.html";
    return;
  }

  const res = await fetch(`/api/user/history/${user._id}`);
  const data = await res.json();

  allData = data;
  render();
}

function setFilter(type, btn){

  currentFilter = type;

  document.querySelectorAll(".filter button").forEach(b=>{
    b.classList.remove("active");
  });

  btn.classList.add("active");

  render();
}

function getTag(type){
  if(type==="deposit") return `<div class="tag deposit">Deposit</div>`;
  if(type==="withdraw") return `<div class="tag withdraw">Withdraw</div>`;
  if(type==="referral") return `<div class="tag referral">Commission</div>`;
  if(type==="game") return `<div class="tag game">Game</div>`;
  if(type==="gift") return `<div class="tag gift">Gift</div>`;
  return `<div class="tag">Other</div>`;
}

function render(){

  let filtered = allData;

  if(currentFilter !== "all"){
    filtered = allData.filter(t => t.type === currentFilter);
  }

  const box = document.getElementById("history");
  box.innerHTML = "";

  if(filtered.length === 0){
    box.innerHTML = "<p style='text-align:center'>No data</p>";
    return;
  }

  filtered.forEach(t => {

    box.innerHTML += `
      <div class="card">
        <div class="top">
          ${getTag(t.type)}
          <div class="status ${t.status}">${t.status}</div>
        </div>

        <div class="info">
          <p><span>Amount</span><span class="amount">৳${t.amount}</span></p>
          <p><span>Method</span><span>${t.method || "-"}</span></p>
          <p><span>Time</span><span>${new Date(t.createdAt).toLocaleString()}</span></p>
          <p><span>ID</span><span>${t.trxId || "-"}</span></p>
        </div>

        ${(t.status === "rejected") ? `
          <div class="btn" onclick="window.open('https://h5.workorder.support/', '_blank')">
            Submit Receipt
          </div>
        ` : ""}
      </div>
    `;
  });
}

loadHistory();

</script>

</body>
</html>
