<!DOCTYPE html>
<html>
<head>
  <title>Banned Users</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#f5f7fb;
    }

    .container{
      padding:20px;
    }

    h2{
      margin-bottom:15px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
      border-radius:10px;
      overflow:hidden;
    }

    thead{
      background:linear-gradient(45deg,#ef4444,#dc2626);
      color:#fff;
    }

    th, td{
      padding:12px;
      text-align:left;
      border-bottom:1px solid #eee;
      font-size:14px;
    }

    tbody tr:hover{
      background:#fff1f2;
    }

    .balance{
      font-weight:bold;
      color:#2196f3;
    }

    .btn{
      padding:5px 10px;
      border:1px solid #ef4444;
      color:#ef4444;
      border-radius:5px;
      background:none;
      cursor:pointer;
    }

    .btn:hover{
      background:#ef4444;
      color:#fff;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Banned Users</h2>

  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Phone</th>
        <th>Last Login</th>
        <th>Balance</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="users"></tbody>
  </table>

</div>

<script>
async function loadUsers(){
  const res = await fetch("/api/admin/banned-users");
  const data = await res.json();

  let html = "";

  if(data.length === 0){
    html = "<tr><td colspan='5'>No Banned Users</td></tr>";
  } else {
    data.forEach(user => {
      html += `
        <tr>
          <td>${user.name || "No Name"}</td>
          <td>${user.phone || "-"}</td>
          <td>${user.lastLogin ? new Date(user.lastLogin).toLocaleString() : "-"}</td>
          <td class="balance">৳${user.balance || 0}</td>
          <td>
            <button onclick="unbanUser('${user._id}')" class="btn">
              Unban
            </button>
          </td>
        </tr>
      `;
    });
  }

  document.getElementById("users").innerHTML = html;
}

// UNBAN FUNCTION
async function unbanUser(id){
  if(!confirm("Unban this user?")) return;

  await fetch("/api/admin/ban", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ userId: id })
  });

  alert("User Unbanned");
  loadUsers();
}

loadUsers();
</script>

</body>
</html>
