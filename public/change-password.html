<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password</title>

<style>
body{font-family:Arial;background:#f2f3f7;margin:0}
.box{padding:20px}
input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
}
.btn{
  background:#ff6a6a;
  color:#fff;
  padding:15px;
  text-align:center;
  border-radius:30px;
}
</style>
</head>

<body>

<div class="box">

<h3>Change login password</h3>

<input type="password" id="old" placeholder="Old password">
<input type="password" id="new" placeholder="New password">
<input type="password" id="confirm" placeholder="Confirm password">

<div class="btn" onclick="changePassword()">Save changes</div>

</div>

<script>
const API = "https://unacoustical-dalia-unoppositional.ngrok-free.dev";
const userId = localStorage.getItem("userId");

async function changePassword(){
  const oldPass = document.getElementById("old").value;
  const newPass = document.getElementById("new").value;
  const confirm = document.getElementById("confirm").value;

  if(newPass !== confirm){
    alert("Password not match");
    return;
  }

  const res = await fetch(API + "/api/user/password", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ userId, oldPass, newPass })
  });

  const data = await res.json();

  if(data.success){
    alert("Password changed ✅");
  }else{
    alert("Wrong password ❌");
  }
}
</script>

</body>
</html>
