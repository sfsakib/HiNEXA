<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f7f8ff;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:415px;
  min-height:100vh;
  background:#f2f3f7;
  padding-bottom:90px; /* 🔥 navbar gap */
}

/* HEADER */
.header{
  background:linear-gradient(180deg,#ff6a6a,#ff8a8a);
  color:#fff;
  padding:15px;
  text-align:center;
  position:relative;
  font-weight:bold;
}

.back{
  position:absolute;
  left:15px;
  top:15px;
  font-size:18px;
}

/* BANNER */
.banner img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* LIST */
.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#fff;
  padding:15px;
  border-bottom:1px solid #eee;
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

.icon{
  width:35px;
  height:35px;
  border-radius:10px;
  background:#ffe5e5;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ff5b5b;
}

.title{
  font-size:14px;
}

.arrow{
  color:#999;
}

/* 🔻 NAVBAR */
.bottom-nav{
  position:fixed;
  bottom:0; 
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:415px;
  background:rgba(255,255,255,0.9); /* 👈 slight premium */
  backdrop-filter:blur(8px);        /* 👈 glass effect */
  border-radius:10px;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.nav-item{
  text-align:center;
  font-size:11px;
  color:#777;
  position:relative;              /* 👈 add */
  transition:0.3s;                /* 👈 smooth */
}

.nav-item i{
  font-size:18px;
  margin-bottom:3px;
  transition:0.3s;                /* 👈 add */
}

.nav-item.active{
  color:#ff5b5b;
}

/* 🔥 small premium effect */
.nav-item.active i{
  transform:translateY(-4px);
}

.nav-item{
  text-align:center;
  font-size:11px;
  color:#777;
  position:relative;
  transition:0.3s;
  text-decoration:none;   /* 🔥 underline remove */
}

.nav-item p{
  margin:0;
}

.nav-item i{
  font-size:18px;
  margin-bottom:3px;
  transition:0.3s;
}

.nav-item.active{
  color:#ff5b5b;
}

.nav-item.active i{
  transform:translateY(-4px);
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <i class="fas fa-arrow-left back" onclick="history.back()"></i>
    About us
  </div>

  <!-- BANNER -->
  <div class="banner">
    <img src="about.webp">
  </div>

  <!-- LIST -->
 <a href="confidentiality.html" class="item">
  <div class="left">
    <div class="icon"><i class="fas fa-file-alt"></i></div>
    <div class="title">Confidentiality Agreement</div>
  </div>
  <div class="arrow"><i class="fas fa-chevron-right"></i></div>
</a>

<a href="risk.html" class="item">
  <div class="left">
    <div class="icon"><i class="fas fa-exclamation"></i></div>
    <div class="title">Risk Disclosure Agreement</div>
  </div>
  <div class="arrow"><i class="fas fa-chevron-right"></i></div>
</a>

</div>

<!-- 🔻 NAVBAR -->
<div class="bottom-nav">

  <a href="home.html" class="nav-item">
    <i class="fas fa-home"></i>
    <p>Home</p>
  </a>

  <a href="activity.html" class="nav-item">
    <i class="fas fa-chart-line"></i>
    <p>Activity</p>
  </a>

  <a href="referral.html" class="nav-item">
    <i class="fas fa-download"></i>
    <p>Referral</p>
  </a>

  <a href="wallet.html" class="nav-item">
    <i class="fas fa-wallet"></i>
    <p>Wallet</p>
  </a>

  <a href="account.html" class="nav-item active">
    <i class="fas fa-user"></i>
    <p>Account</p>
  </a>

</div>

</body>
</html>
