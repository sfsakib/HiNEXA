<!DOCTYPE html>
<html>
<head>
<title>Admin Feedback</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}

.card{
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

.time{
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<h2>All Feedback</h2>
<div id="list"></div>

<script>
async function loadFeedback(){
  const res = await fetch("/api/admin/feedback");
  const data = await res.json();

  const box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach(f => {
    box.innerHTML += `
      <div class="card">
        <p>${f.message}</p>
        <div class="time">${new Date(f.createdAt).toLocaleString()}</div>
      </div>
    `;
  });
}

loadFeedback();
</script>

</body>
</html>
